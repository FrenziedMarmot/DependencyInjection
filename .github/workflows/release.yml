name: Nuget Release


# Controls when the action will run. 
on:
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Download artifact
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          # Required, workflow file name or ID
          workflow: dotnet.yml
          branch: main
          name: artifact
          path: build
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x
      - name: Push with dotnet
        run: dotnet nuget push build/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $NUGET_API_KEY
        env:
          NUGET_API_KEY: ${{ secrets.FM_NUGET }}
      - name: Push
        run: dotnet nuget push build/*.nupkg --source https://nuget.pkg.github.com/FrenziedMarmot/index.json --api-key $GITHUB_PKG_API_KEY
        env:
          GITHUB_PKG_API_KEY: ${{ secrets.FM_GITHUB_PKG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
